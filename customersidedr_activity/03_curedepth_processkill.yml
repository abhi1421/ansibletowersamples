    - name: Node 2 - Check Screen Sockets (After)
      shell: screen -ls
      register: screen_after_node2
      ignore_errors: yes
      failed_when: screen_after_node2.rc not in [1]



#############################################
# PLAY 3: ARBITRATION & CENTRALIZED REPORTING
#############################################
- name: Final Validation and Orchestration Reporting
  hosts: localhost
  gather_facts: no
  become: no  # <-- Crucial: Bypasses local permission ownership faults
  vars:
    node1_ip: "172.24.21.132"
    node2_ip: "172.24.21.134"

  tasks:
    - name: Evaluate Phase Execution State Matrix
      set_fact:
        n1_screens_clear: >-
          {{
            'No Sockets' in (hostvars[node1_ip].screen_after_node1.stdout | default('')) or
            (hostvars[node1_ip].screen_after_node1.rc | default(1) | int != 0)
          }}
        n2_screens_clear: >-
          {{
            'No Sockets' in (hostvars[node2_ip].screen_after_node2.stdout | default('')) or
            (hostvars[node2_ip].screen_after_node2.rc | default(1) | int != 0)
          }}


    - name: Determine Global Success Criteria
      set_fact:
        shutdown_step_failed: "{{ not n1_screens_clear or not n2_screens_clear }}"

    - name: Capture Execution Timestamp
      set_fact:
        exec_time: "{{ lookup('pipe', 'date +\"%d-%b-%Y %H:%M:%S\"') }}"

    - name: Build Comprehensive Shutdown Audit Log
      set_fact:
        dr_report: |
          =======================================================
          DR SHUTDOWN & VERIFICATION REPORT
          =======================================================
          Execution Time: {{ exec_time }}
          Overall Status: {{ '❌ CRITICAL TEARDOWN CONDITIONAL FAILURE' if shutdown_step_failed else '✅ PASSED' }}

          NODE 1: {{ node1_ip }}
          -------------------------------------------------------
          * Active Screen Sockets Status: {{ '🟢 CLEAN (All processes dropped)' if n1_screens_clear else '⚠️ ALIVE (Hanging sockets detected)' }}
          
          NODE 2: {{ node2_ip }}
          -------------------------------------------------------
          * Active Screen Sockets Status: {{ '🟢 CLEAN (All processes dropped)' if n2_screens_clear else '⚠️ ALIVE (Hanging sockets detected)' }}
          =======================================================

    - name: Output Compiled Shutdown Status to Console
      debug:
        msg: "{{ dr_report }}"

    # ----------------------------------------------------
    # CONDITION A: RUNTIME FAILURE PATH (Central AAP Failure Handler)
    # ----------------------------------------------------
    - name: Register Global Artifact Variables for AAP Failure Workflow
      set_stats:
        data:
          dr_failed_step: "03_stop_validatechannels"
          dr_failure_reason: "Application shutdown dropped cleanly check failed or Java Two-Phase Commit XA assertions rejected."
          dr_detailed_log: "{{ dr_report }}"
        per_host: no
      when: shutdown_step_failed

    - name: Enforce Hard Failure Path for Automation Workflow
      fail:
        msg: "Application shutdown lifecycle or verification metrics out of bounds. Halting workflow progression."
      when: shutdown_step_failed

    # ----------------------------------------------------
    # CONDITION B: RUNTIME SUCCESS PATH (Only runs if 'fail' is skipped)
    # ----------------------------------------------------
    - name: Register Step Success to Global Matrix Variable
      set_stats:
        data:
          dr_step_02_status: "✅ PASSED (Apps stopped cleanly and Two-Phase Commit XA verified)"
        per_host: no

    - name: Send consolidated Summary Email
      community.general.mail:
        host: 10.35.1.17
        port: 25
        to: "{{ email_recepients | join(', ') }}"
        from: ansible.alerts@rbi.org.in
        subject: "📢 DR UPDATE: Stage [03_stop_validatechannels] PASSED"
        body: |
          Step 03 has completed successfully. Node environments are stopped and XA verified.
          Summary Details:
          {{ dr_report }}
      delegate_to: localhost
      run_once: true
