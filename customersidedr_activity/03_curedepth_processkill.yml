        PIDS=$(ps -ef | grep -E "start-tc-server\.sh|tc\.jar" | grep -v grep | awk '{print $2}')
        if [ -n "$PIDS" ]; then
          for pid in $PIDS; do
            kill -9 $pid
            echo "Killed Ehcache process PID - $pid"
          done
        else
          echo "No active Ehcache process found to kill."
        fi
      register: kill_ehcache_node2
      become_user: sfmspadl302
      ignore_errors: yes


    - name: Print teardown summary log
      debug:
        msg: "{{ kill_ehcache_node2 }}"



