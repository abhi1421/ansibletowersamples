---
#############################################
# PLAY 1: NODE 1 OPERATIONS
#############################################
- name: PAD Node 1 - MQ Check, Shutdown, and XA Test
  hosts: 172.23.21.132
  gather_facts: no
  become_method: sudo
  vars:
    ansible_become_flags: "-H -S"
    ansible_ssh_pipelining: true
    mqm_binary: /usr/mqm/bin
    ansible_shell_executable: /usr/bin/ksh
    
    # Precise cluster structure to avoid ghost queue lookup faults
    mq_check_matrix_n1:
      - { qmgr: "SFMSRBIPADGWQM", queue: "IDRBT.QUEUE.MANAGER" }
      - { qmgr: "SFMSRBIPADGWQM", queue: "NEFT.QPXXMITQ" }
      - { qmgr: "SFMSRBIPADGWQM", queue: "NEFT.CBSXMITQ" }
      - { qmgr: "SFMSRBIPADCLQM1", queue: "RBISPADBRQ" }
      - { qmgr: "SFMSRBIPADCLQM1", queue: "SFMS.INCOMING" }

  tasks:
    - name: Node 1 - Validate MQ Queue Depths Before Stop
      shell: "echo 'dis ql({{ item.queue }}) curdepth' | {{ mqm_binary }}/runmqsc {{ item.qmgr }}"
      loop: "{{ mq_check_matrix_n1 }}"
      become_user: mqm
      become: yes
      register: mq_node1
      ignore_errors: yes

    - name: Node 1 - Check Screen Sockets (Before)
      shell: screen -ls
      become_user: mqm
      become: yes
      register: screen_before_node1
      failed_when: screen_before_node1.rc not in [1]


    - name: Node 1 - Terminate Core Application Processing
      shell: |
        printf "2\ny\n" | /home/sfmspadl301/SH_Files/Main_Script_All_Process.sh
      become: yes
      become_user: sfmspadl301
      args:
        executable: /bin/bash
        chdir: /home/sfmspadl301
      register: stop_node1

    - name: Node 1 - Isolate and Kill Active Ehcache Screen Session
      shell: |
        PIDS=$(ps -ef | grep -E "start-tc-server\.sh|tc\.jar" | grep -v grep | awk '{print $2}')
        if [ -n "$PIDS" ]; then
          for pid in $PIDS; do
            kill -9 $pid
            echo "Killed Ehcache process PID - $pid"
          done
        else
          echo "No active Ehcache process found to kill."
        fi
      register: kill_ehcache_node1
      become_user: sfmspadl301
      ignore_errors: yes
  
    
    - name: Print teardown summary log
      debug:
        msg: "{{ kill_ehcache_node1 }}"


#    - name: Node 1 - Isolate and Kill Active Ehcache Screen Session
#      shell: |
#        screen -ls | grep -i "ehcache" | awk -F. '{print $1}' | while read pid; do [ -n "$pid" ] && kill -9 $pid; done
#      register: kill_ehcache_node1
#      ignore_errors: yes


    - name: Node 1 - Check Screen Sockets (After)
      shell: screen -ls
      register: screen_after_node1
      ignore_errors: yes
      failed_when: screen_after_node1.rc not in [1]

#############################################
