---
#############################################
# PLAY 1: TWO-PHASE COMMIT & QUEUE CHECKS
#############################################
- name: Step 05b - Two-Phase Commit Validation and DR Queue Verification
  hosts: all
  gather_facts: no
#  become: yes
#  become_method: sudo
  vars:
    ansible_become_flags: "-H -S"
    ansible_ssh_pipelining: true
    mqm_binary: /usr/mqm/bin

    # Host definitions to align with node-specific constraints
    node1_host: "172.23.21.132"
    node2_host: "172.23.21.134"

    # Node 1 Specific Matrix
    qmgr_n1: "SFMSRBIPADCLQM1"
    queues_n1:
      - "RBISPADBRQ"
      - "SFMS.INCOMING"

    # Node 2 Specific Matrix
    qmgr_n2: "SFMSRBIPADCLQM2"
    queues_n2:
      - "RBISPADBRQ"
      - "SFMS.INCOMING"

  tasks:
  
    # ----------------------------------------------------
    # NODE 1 OPERATIONS
    # ----------------------------------------------------
    - name: Node 1 - Execute Java Two-Phase Commit XA Test
      shell: |
        printf "SFMSRBIPADCLQM1\n" | java -Djava.library.path='/usr/mqm/java/lib64' RunXATest SFMS
      register: xa_node1
      environment:
        CLASSPATH: "/sfmsapp1/sfmspdc/SFMS/SFMSAppFiles/appjars/*:/orahome/app/oracle/product/19.0.0/client_1//jdbc/lib/ojdbc8.jar:/opt/java17/jdk-17.0.7+7/lib/*:/opt/java17/jdk-17.0.7+7/jre/lib:/sfmsapp1/sfmspdc/SFMS/apache-tomcat-10.1.34/webapps/sfms/WEB-INF/classes:/sfmsapp1/sfmspdc/SFMS/SFMSAppFiles/appjars/*:/sfmsapp1/sfmspdc/SFMS/SFMSAppFiles/appjars/mqlib/*:/sfmsapp1/sfmspdc/SFMS/SFMSAppFiles/appjars/log4jlib/*:/sfmsapp1/sfmspdc/SFMS/app_properties/securityconfig:/sfmsapp1/sfmspdc/SFMS/app_properties/logconfig:/sfmsapp1/sfmspdc/SFMS/app_properties/appProcessesConf:/sfmsapp1/sfmspdc/SFMS/SFMSAppFiles/appjars/javafxjars/*:/sfmsapp1/sfmspdc/SFMS/SFMSAppFiles/appjars/security/*:.:"
        JAVA_HOME: "/opt/java17/jdk-17.0.7+7"
        PATH: "/orahome/app/oracle/product/19.0.0/client_1//bin:/usr/mqm/java/lib64:/usr/mqm/java/lib/*:/opt/java17/jdk-17.0.7+7/lib:/opt/java17/jdk-17.0.7+7/bin:/opt/java17/jdk-17.0.7+7/jre/bin:/usr/mqm/bin:/usr/bin:/etc:/usr/sbin:/usr/ucb:/home/sfmspadl301/bin:/usr/bin/X11:/sbin:/sfmsapp1/sfmspdc/SFMS/apache-tomcat-10.1.34/bin:/sfmsapp1/sfmspdc/SFMS/app_properties/appProcessesConf/lib:.:"
        SFMS_HOME: "/sfmsapp1/sfmspdc/SFMS"
        MQ_JAVA_DATA_PATH: "/var/mqm"
        MQ_INSTALLATION_PATH: "/usr/mqm"
        MQ_ENV_MODE: "32"
        MQ_DATA_PATH: "/var/mqm"
        MQ_JRE_PATH: "/usr/mqm/java/jre64/jre"
        MQ_JAVA_INSTALL_PATH: "/usr/mqm/java"
        MQ_JAVA_LIB_PATH: "/usr/mqm/java/lib"
        MQ_INSTALLATION_NAME: "Installation1"
      args:
        chdir: /home/sfmspadl301
      become_user: sfmspadl301
      become: yes
      become_method: sudo
      when: inventory_hostname == node1_host
      ignore_errors: yes

    - name: Node 1 - Verify DR Queue Manager Depths are Zero
      shell: "echo 'dis ql({{ item }}) curdepth' | {{ mqm_binary }}/runmqsc {{ qmgr_n1 }}"
      loop: "{{ queues_n1 }}"
      register: mq_depth_node1
      become_user: mqm
      when: inventory_hostname == node1_host
      ignore_errors: yes

    # ----------------------------------------------------
    # NODE 2 OPERATIONS
    # ----------------------------------------------------

    - name: Node 2 - Execute Java Two-Phase Commit XA Test
      shell: |
        printf "SFMSRBIPADCLQM2\n" | java -Djava.library.path='/usr/mqm/java/lib64' RunXATest SFMS
      register: xa_node2
      environment:
        CLASSPATH: "/sfmsapp2/sfmspdc/SFMS/SFMSAppFiles/appjars/*:/orahome/app/oracle/product/19.0.0/client_1//jdbc/lib/ojdbc8.jar:/opt/java17/jdk-17.0.7+7/lib/*:/opt/java17/jdk-17.0.7+7/jre/lib:/sfmsapp2/sfmspdc/SFMS/apache-tomcat-10.1.34/webapps/sfms/WEB-INF/classes:/sfmsapp2/sfmspdc/SFMS/SFMSAppFiles/appjars/*:/sfmsapp2/sfmspdc/SFMS/SFMSAppFiles/appjars/mqlib/*:/sfmsapp2/sfmspdc/SFMS/SFMSAppFiles/appjars/log4jlib/*:/sfmsapp2/sfmspdc/SFMS/app_properties/securityconfig:/sfmsapp2/sfmspdc/SFMS/app_properties/logconfig:/sfmsapp2/sfmspdc/SFMS/app_properties/appProcessesConf:/sfmsapp2/sfmspdc/SFMS/SFMSAppFiles/appjars/javafxjars/*:/sfmsapp2/sfmspdc/SFMS/SFMSAppFiles/appjars/security/*:.:"
        JAVA_HOME: "/opt/java17/jdk-17.0.7+7"
        PATH: "/orahome/app/oracle/product/19.0.0/client_1//bin:/usr/mqm/java/lib64:/usr/mqm/java/lib/*:/opt/java17/jdk-17.0.7+7/lib:/opt/java17/jdk-17.0.7+7/bin:/opt/java17/jdk-17.0.7+7/jre/bin:/usr/mqm/bin:/usr/bin:/etc:/usr/sbin:/usr/ucb:/home/sfmspadl302/bin:/usr/bin/X11:/sbin:/sfmsapp2/sfmspdc/SFMS/apache-tomcat-10.1.34/bin:/sfmsapp2/sfmspdc/SFMS/app_properties/appProcessesConf/lib:"
        SFMS_HOME: "/sfmsapp2/sfmspdc/SFMS"
        MQ_JAVA_DATA_PATH: "/var/mqm"
        MQ_INSTALLATION_PATH: "/usr/mqm"
        MQ_ENV_MODE: "32"
        MQ_DATA_PATH: "/var/mqm"
        MQ_JRE_PATH: "/usr/mqm/java/jre64/jre"
        MQ_JAVA_INSTALL_PATH: "/usr/mqm/java"
        MQ_JAVA_LIB_PATH: "/usr/mqm/java/lib"
        MQ_INSTALLATION_NAME: "Installation1"
      args:
        chdir: /home/sfmspadl302
      become_user: sfmspadl302
      become: yes
      become_method: sudo
      when: inventory_hostname == node2_host
      ignore_errors: yes


    - name: Node 2 - Verify DR Queue Manager Depths are Zero
      shell: "echo 'dis ql({{ item }}) curdepth' | {{ mqm_binary }}/runmqsc {{ qmgr_n2 }}"
      loop: "{{ queues_n2 }}"
      register: mq_depth_node2
      become_user: mqm
      when: inventory_hostname == node2_host
      ignore_errors: yes


#############################################
# PLAY 2: CENTRAL ARBITRATION & REPORTING
#############################################
- name: Final Validation and Technical Report Compilation
  hosts: localhost
  gather_facts: no
  become: no  # Bypasses local file-permission ownership faults on AAP
  vars:
    node1_ip: "172.23.21.132"
    node2_ip: "172.23.21.134"

  tasks:
    - name: Evaluate Phase Execution State Matrix
      set_fact:
        n1_xa_passed: "{{ 'Two phase commit tested successfully!!!' in hostvars[node1_ip].xa_node1.stdout | default('') }}"
        n2_xa_passed: "{{ 'Two phase commit tested successfully!!!' in hostvars[node2_ip].xa_node2.stdout | default('') }}"
        
        # Verify queue outputs do not contain message backlogs (checks for CURDEPTH(0))
        n1_queues_clean: "{{ hostvars[node1_ip].mq_depth_node1.results | default([]) | rejectattr('stdout', 'search', 'CURDEPTH\\(0\\)') | list | length == 0 }}"
        n2_queues_clean: "{{ hostvars[node2_ip].mq_depth_node2.results | default([]) | rejectattr('stdout', 'search', 'CURDEPTH\\(0\\)') | list | length == 0 }}"

    - name: Determine Global Success Criteria
      set_fact:
        xa_validation_failed: "{{ not n1_xa_passed or not n2_xa_passed or not n1_queues_clean or not n2_queues_clean }}"

    - name: Capture Execution Timestamp
      set_fact:
        exec_time: "{{ lookup('pipe', 'date +\"%d-%b-%Y %H:%M:%S\"') }}"

    - name: Build Comprehensive Verification Audit Log
      set_fact:
        dr_report: |
          =======================================================
          DR POST-SWITCHOVER XA & QUEUE VERIFICATION REPORT
          =======================================================
          Execution Time: {{ exec_time }}
          Overall Status: {{ '❌ CRITICAL VERIFICATION STATE FAILURE' if xa_validation_failed else '✅ PASSED' }}

          NODE 1: {{ node1_ip }}
          -------------------------------------------------------
          * Two-Phase Commit XA Verification: {{ '🟢 SUCCESSFUL' if n1_xa_passed else '❌ FAILED / MISSING' }}
          * DR Queue Depths Clear (0 Backlog): {{ '🟢 CLEAN' if n1_queues_clean else '⚠️ MESSAGES FOUND IN QUEUE' }}
          
          NODE 2: {{ node2_ip }}
          -------------------------------------------------------
          * Two-Phase Commit XA Verification: {{ '🟢 SUCCESSFUL' if n2_xa_passed else '❌ FAILED / MISSING' }}
          * DR Queue Depths Clear (0 Backlog): {{ '🟢 CLEAN' if n2_queues_clean else '⚠️ MESSAGES FOUND IN QUEUE' }}
          =======================================================

    - name: Output Compiled Verification Status to Console
      debug:
        msg: "{{ dr_report }}"

    # ----------------------------------------------------
    # CONDITION A: RUNTIME FAILURE PATH (Central AAP Failure Handler)
    # ----------------------------------------------------
    - name: Register Global Artifact Variables for AAP Failure Workflow
      set_stats:
        data:
          dr_failed_step: "05b_two_phase_commit"
          dr_failure_reason: "Java Two-Phase Commit XA assertions rejected or message backlogs detected on DR queues."
          dr_detailed_log: "{{ dr_report }}"
        per_host: no
      when: xa_validation_failed

    - name: Enforce Hard Failure Path for Automation Workflow
      fail:
        msg: "DR Two-Phase Commit validation failed core constraints. Halting workflow progression."
      when: xa_validation_failed

    # ----------------------------------------------------
    # CONDITION B: RUNTIME SUCCESS PATH (Only runs if 'fail' is skipped)
    # ----------------------------------------------------
    - name: Register Step Success to Global Matrix Variable
      set_stats:
        data:
          dr_step_05b_status: "✅ PASSED (Two-Phase Commit verified successfully and DR queues are empty)"
        per_host: no


    - name: Send consolidated Summary Email
      community.general.mail:
        host: 10.35.1.17
        port: 25
        to: "{{ email_recepients | join(', ') }}"
        from: ansible.alerts@rbi.org.in
        subject:  "📢 DR UPDATE: Stage [05b_two_phase_commit] PASSED"
        body: |
          Step 05b has completed successfully. Two-Phase Commit validation passed and DR site queues are empty.

          Summary Details:
          {{ dr_report }}
      delegate_to: localhost
      run_once: true
