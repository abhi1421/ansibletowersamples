---
- name: Step 1 - Stop SFMS Sender Channels
  hosts: all
  become: yes
  become_method: sudo
  become_user: mqm
  gather_facts: no
  vars:
    ansible_become_flags: "-H -S"
    ansible_ssh_pipelining: true
    qmgr: SFMSRBIPADGWQM
    channels:
      - SFMS.TO.QPX
    mqm_binary: /usr/mqm/bin

  tasks:
    - name: Check if Queue Manager is running
      shell: "{{ mqm_binary }}/dspmq | grep {{ qmgr }}"
      register: qm_status
      ignore_errors: yes  

    - name: Check channel status before stop
      shell: "echo 'dis chs({{ item }})' | {{ mqm_binary }}/runmqsc {{ qmgr }}"
      loop: "{{ channels }}"
      register: ch_status_before
      changed_when: false

    - name: Stop channel only if RUNNING
      shell: "echo 'stop channel({{ item.item }})' | {{ mqm_binary }}/runmqsc {{ qmgr }}"
      loop: "{{ ch_status_before.results }}"
      when: "'RUNNING' in item.stdout"
      register: stop_output
      changed_when: "'STOPPED' in stop_output.stdout or 'STOPPING' in stop_output.stdout"

    - name: Wait until channel stops
      shell: "echo 'dis chs({{ item }})' | {{ mqm_binary }}/runmqsc {{ qmgr }}"
      loop: "{{ channels }}"
      register: ch_status_after
      retries: 5
      delay: 5
      until: "'RUNNING' not in ch_status_after.stdout"
      changed_when: false

    #########################################
    # REPORTING & EVALUATION SECTION
    #########################################
    - name: Generate Individual server report
      set_fact:
        host_report: |
          SERVER: {{ inventory_hostname }}
          ---------------------------------
          QMGR Status Check: {{ qm_status.stdout | default('N/A') | trim }}
          Channel Execution Details:
          {% for result in ch_status_after.results %}
            - Channel: {{ result.item }}
              Final Status: {{ 'SUCCESSFULLY STOPPED' if 'RUNNING' not in result.stdout else 'FAILED TO STOP' }}
          {% endfor %}

    - name: Determine if Host Encountered Stop Failures
      set_fact:
        host_has_failures: "{{ ch_status_after.results | selectattr('stdout', 'search', 'RUNNING') | list | length > 0 }}"

    - name: Consolidate reports for email body
      set_fact:
        consolidated_report: "{{ ansible_play_hosts | map('extract', hostvars, 'host_report') | join('\n\n') }}"
      run_once: true
      delegate_to: localhost

    - name: Evaluate Global Cluster Status Matrix
      set_fact:
        channels_stop_failed: "{{ ansible_play_hosts | map('extract', hostvars, 'host_has_failures') | map('bool') | select('equalto', true) | list | length > 0 }}"
      run_once: true
      delegate_to: localhost

    - name: Show Final Report Content
      debug:
        var: consolidated_report
      run_once: true

    # ----------------------------------------------------
    # CONDITION A: RUNTIME FAILURE PATH (Central AAP Failure Handler)
    # ----------------------------------------------------
    - name: Register Global Artifact Variables for AAP Failure Workflow
      set_stats:
        data:
          dr_failed_step: "02_stop_sender_channel"
          dr_failure_reason: "One or more IBM MQ sender channels failed to drop from a RUNNING state."
          dr_detailed_log: "{{ consolidated_report }}"
        per_host: no
      when: channels_stop_failed
      run_once: true
      delegate_to: localhost

    - name: Enforce Hard Failure Path for Automation Workflow
      fail:
        msg: "Sender channel teardown failed on target servers. Halting workflow progression."
      when: channels_stop_failed
      run_once: true
      delegate_to: localhost

    # ----------------------------------------------------
    # CONDITION B: RUNTIME SUCCESS PATH (Only runs if 'fail' is skipped)
    # ----------------------------------------------------
    - name: Register Step Success to Global Matrix Variable
      set_stats:
        data:
          dr_step_02_status: "✅ PASSED (All specified outbound channels stopped completely)"
        per_host: no
      run_once: true
      delegate_to: localhost

    - name: Dispatch Scattered Success Email for Step 02
      mail:
        host: smtp.yourcompany.com
        port: 25
        subject: "📢 DR UPDATE: Stage [02_stop_sender_channel] PASSED"
        body: |
          Step 02 has completed successfully. Outbound traffic channels have been isolated.
          
          Summary Details:
          {{ consolidated_report }}
        to: ops-team@yourcompany.com
        from: aap-automation-noreply@yourcompany.com
      ignore_errors: yes
      run_once: true
      delegate_to: localhost