---
#############################################
# PLAY 1: NODE 1 OPERATIONS
#############################################
- name: PAD Node 1 - Start Ehcache, Processes, and Frontend
  hosts: 172.24.21.132
  gather_facts: no
  become: yes
  become_method: sudo
  vars:
    ansible_become_flags: "-H -S"
    ansible_ssh_pipelining: true

  tasks:
    # --- EHCACHE LIFECYCLE (Bypasses the nested terminal constraint using background forks) ---
    - name: Node 1 - Initialize Core Ehcache Server Engine
      shell: |
        nohup sh /home/sfmspadl301/start-ehcache-server.sh > /dev/null 2>&1 &
        sleep 5
      args:
        executable: /bin/bash
        chdir: /home/sfmspadl301
      become_flags: "-i"   # Simulates a complete user shell login profile

    # --- MAIN CORE PROCESSING LAYERS ---
    - name: Node 1 - Launch Core Application Processing Modules
      shell: |
        echo -e "1\ny" | bash /home/sfmspadl301/SH_Files/Main_Script_All_Process.sh
      args:
        executable: /bin/bash
        chdir: /home/sfmspadl301/SH_Files
      register: start_node1

    - name: Node 1 - Stop and Start Frontend Application Engine (Catalina)
      shell: |
        sh catalina.sh start
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Node 1 - Check and Register Screen Sockets (Verification)
      shell: screen -ls
      register: screen_after_node1
      ignore_errors: yes


#############################################
# PLAY 2: NODE 2 OPERATIONS
#############################################
- name: PAD Node 2 - Start Ehcache and Processes
  hosts: 172.24.21.134
  gather_facts: no
  become: yes
  become_method: sudo
  vars:
    ansible_become_flags: "-H -S"
    ansible_ssh_pipelining: true

  tasks:
    # --- EHCACHE LIFECYCLE ---
    - name: Node 2 - Initialize Core Ehcache Server Engine
      shell: |
        nohup sh /home/sfmspadl301/start-ehcache-server.sh > /dev/null 2>&1 &
        sleep 5
      args:
        executable: /bin/bash
        chdir: /home/sfmspadl301
      become_flags: "-i"

    # --- MAIN CORE PROCESSING LAYERS ---
    - name: Node 2 - Launch Core Application Processing Modules
      shell: |
        echo -e "1\ny" | bash SH_Files/Main_Script_Specific_Process.sh
      args:
        executable: /bin/bash
      register: start_node2

    - name: Node 2 - Check and Register Screen Sockets (Verification)
      shell: screen -ls
      register: screen_after_node2
      ignore_errors: yes


#############################################
# PLAY 3: CENTRAL ARBITRATION & REPORTING
#############################################
- name: Final Startup Validation and Reporting
  hosts: localhost
  gather_facts: no
  become: no  # Bypasses local file-permission ownership faults on AAP
  vars:
    node1_ip: "172.24.21.132"
    node2_ip: "172.24.21.134"

  tasks:
    - name: Evaluate Application Component Status
      set_fact:
        n1_startup_valid: "{{ 'ehcache' in hostvars[node1_ip].screen_after_node1.stdout and hostvars[node1_ip].screen_after_node1.stdout is search('[1-9] Sockets') }}"
        n2_startup_valid: "{{ 'ehcache' in hostvars[node2_ip].screen_after_node2.stdout and hostvars[node2_ip].screen_after_node2.stdout is search('[1-9] Sockets') }}"

    - name: Determine Global Success Criteria
      set_fact:
        startup_step_failed: "{{ not n1_startup_valid or not n2_startup_valid }}"

    - name: Capture Execution Timestamp
      set_fact:
        exec_time: "{{ lookup('pipe', 'date +\"%d-%b-%Y %H:%M:%S\"') }}"

    - name: Build Comprehensive Startup Audit Log
      set_fact:
        dr_report: |
          =======================================================
          DR ENVIRONMENT STARTUP & VERIFICATION REPORT
          =======================================================
          Execution Time: {{ exec_time }}
          Overall Status: {{ '❌ CRITICAL STARTUP CONDITIONAL FAILURE' if startup_step_failed else '✅ PASSED' }}

          NODE 1: {{ node1_ip }}
          -------------------------------------------------------
          * Component Verification Status: {{ '🟢 RUNNING (All screens active & verified)' if n1_startup_valid else '❌ FAULT (Processes or Ehcache engine failed to start)' }}
          * Detailed Active Sockets:
          {{ hostvars[node1_ip].screen_after_node1.stdout | default('No active screens found.') }}
          
          NODE 2: {{ node2_ip }}
          -------------------------------------------------------
          * Component Verification Status: {{ '🟢 RUNNING (All screens active & verified)' if n2_startup_valid else '❌ FAULT (Processes or Ehcache engine failed to start)' }}
          * Detailed Active Sockets:
          {{ hostvars[node2_ip].screen_after_node2.stdout | default('No active screens found.') }}
          =======================================================

    - name: Output Compiled Startup Status to Console
      debug:
        msg: "{{ dr_report }}"

    # ----------------------------------------------------
    # CONDITION A: RUNTIME FAILURE PATH (Central AAP Failure Handler)
    # ----------------------------------------------------
    - name: Register Global Artifact Variables for AAP Failure Workflow
      set_stats:
        data:
          dr_failed_step: "05c_start_catalina_ehcache"
          dr_failure_reason: "One or more core messaging engines, frontend layers, or active screens failed to launch completely."
          dr_detailed_log: "{{ dr_report }}"
        per_host: no
      when: startup_step_failed
      vars:
        ansible_connection: local

    - name: Enforce Hard Failure Path for Automation Workflow
      fail:
        msg: "DR Application startup validation failed core constraints. Halting workflow progression."
      when: startup_step_failed
      vars:
        ansible_connection: local

    # ----------------------------------------------------
    # CONDITION B: RUNTIME SUCCESS PATH (Only runs if 'fail' is skipped)
    # ----------------------------------------------------
    - name: Register Step Success to Global Matrix Variable
      set_stats:
        data:
          dr_step_05c_status: "✅ PASSED (All systems launched, components running, and active sockets validated)"
        per_host: no
      vars:
        ansible_connection: local

    - name: Dispatch Scattered Success Email for Step 05c
      mail:
        host: smtp.yourcompany.com
        port: 25
        subject: "📢 DR UPDATE: Stage [05c_start_catalina_ehcache] PASSED"
        body: |
          Step 05c has completed successfully. All target core processing modules are active.
          
          Summary Details:
          {{ dr_report }}
        to: ops-team@yourcompany.com
        from: aap-automation-noreply@yourcompany.com
      ignore_errors: yes
      vars:
        ansible_connection: local