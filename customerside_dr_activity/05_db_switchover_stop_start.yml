---
- name: Oracle Data Guard Switchover Automation
  hosts: all
  gather_facts: no
#  become_method: sudo
#  become_user: PADPRODDBL101
  any_errors_fatal: true # Stop all execution if any single task fails

  vars:
    ansible_become_flags: "-H -S"
    ansible_ssh_pipelining: true
    ansible_shell_executable: /usr/bin/ksh

    db_unique_name_primary: "SFMSREPB"
    db_unique_name_standby: "SFMSREPK"
    db_sid_name: "SFMS"
    oracle_home: "/orahome/app/product/19.0.0/dbhome_1"
    log_dest_index: "3"
    
    # Validation Keywords (Adjust these when the team provides final strings)
    kw_startup_success: "ORACLE instance started"
    kw_shutdown_success: "ORACLE instance shut down"
    
    # Host Identification (Must match your AAP Inventory names)
    standby_node: "172.22.182.201"
    primary_node: "172.23.182.201"

    # Default missing values to prevent dictionary loop lookup errors
    db_name: "SFMS"
    step9_out: { "changed": false, "rc": 0 }

  tasks:
    # --- STEP 1: ARCHIVE LOG BACKUP ---
    - name: 1. Archive Log Backup and Cleanup
      shell: "sh /pad_oraBkp/BACKUPS/DBA_Activity/DBA_Script/archive_SFMS_BKP_DEL_MOR_TTS.sh"
      when: inventory_hostname == primary_node
      register: step1_out
      failed_when: "'Recovery Manager complete' not in step1_out.stdout"

    # --- STEP 2: SWITCHOVER CHECK ---
    - name: 2. Switchover Role Check (Primary)
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}
 
        echo "SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEAD OFF;
        SELECT DATABASE_ROLE, SWITCHOVER_STATUS, OPEN_MODE FROM V\$DATABASE;
        EXIT;" | {{ oracle_home }}/bin/sqlplus -s / as sysdba
      register: step2_out
      when: inventory_hostname == primary_node
      args:
        executable: /bin/bash

    - name: Validate Step 2 Output
      fail: 
        msg: "Switchover check failed {{ hostvars[primary_node].step2_out.stdout | default('No output') }}"
      when: >
        inventory_hostname == primary_node and
        (hostvars[primary_node].step2_out is not defined or
        hostvars[primary_node].step2_out.stdout is not defined or
        ('PRIMARY' not in hostvars[primary_node].step2_out.stdout | upper) or
        ('TO STANDBY' not in hostvars[primary_node].step2_out.stdout | upper) or
        ('READ WRITE' not in hostvars[primary_node].step2_out.stdout | upper))

#    # --- STEP 3: SWITCHOVER VERIFY ---
    - name: 3. Switchover Verify
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
        ALTER DATABASE SWITCHOVER TO {{ db_unique_name_standby }} VERIFY;
        EOF
      when: inventory_hostname == primary_node
      register: step3_out
      failed_when: "'Database altered' not in step3_out.stdout"

#    # --- STEP 4: EXECUTE SWITCHOVER ---
    - name: 4. Execute Switchover (Primary to Standby)
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
        ALTER DATABASE SWITCHOVER TO {{ db_unique_name_standby }};
        EOF
      when: inventory_hostname == primary_node
      register: step4_out
      failed_when: "'Database altered' not in step4_out.stdout"

    - name: Sleep for 120 seconds and continue the play
      pause:
        seconds: 120

#    # --- STEP 5: START NEW PRIMARY ---
    - name: 5. Startup New Primary (on Standby Node)
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}        
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
        SHUT IMMEDIATE;
        STARTUP;
        EOF
      when: inventory_hostname == standby_node
      register: step5_out
      failed_when: kw_startup_success not in step5_out.stdout

#   # --- STEP 6: VERIFY NEW PRIMARY ---
    - name: 6. Verify Role on New Primary
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
        SET PAGESIZE 0 FEEDBACK OFF HEAD OFF
        SELECT DATABASE_ROLE, OPEN_MODE FROM V\$DATABASE;
        EOF
      when: inventory_hostname == standby_node
      register: step6_out
      failed_when: 
        - "'PRIMARY' not in step6_out.stdout"
        - "'READ WRITE' not in step6_out.stdout"

    # --- STEP 7: RESTART OLD PRIMARY AS STANDBY ---
    - name: 7.a Shutdown Old Primary
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
        SHUTDOWN IMMEDIATE;
        EOF
      when: inventory_hostname == primary_node
      register: step7a_out
#      failed_when: kw_shutdown_success not in step7a_out.stdout

    - name: 7.b Startup Old Primary in Mount Mode
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
        STARTUP MOUNT;
        EOF
      when: inventory_hostname == primary_node
      register: step7b_out
      failed_when: kw_startup_success not in step7b_out.stdout
#
#    # --- STEP 8: START RECOVERY & VALIDATE ---
    - name: 8. Start Managed Recovery and Validate
      shell: |
        export ORACLE_SID={{ db_sid_name }}
        export ORACLE_HOME={{ oracle_home }}
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
        SET PAGESIZE 0 FEEDBACK OFF HEAD OFF
        ALTER DATABASE RECOVER MANAGED STANDBY DATABASE DISCONNECT FROM SESSION;
        SELECT DATABASE_ROLE FROM V\$DATABASE;
        EOF
      when: inventory_hostname == primary_node
      register: step8_out
      failed_when: "'PHYSICAL STANDBY' not in step8_out.stdout"
#
#    # --- STEP 9: DEFER LOG ARCHIVE ---
#    - name: 9. Defer Log Archive Destination on New Primary
#      shell: |
#        export ORACLE_SID={{ db_sid_name }}
#        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
#        ALTER SYSTEM SET LOG_ARCHIVE_DEST_STATE_{{ log_dest_index }}=DEFER;
#        EOF
#      when: inventory_hostname == standby_node
#      register: step9_out

#    # --- DEBUGGING (Triggers for every step for visibility) ---
    - name: Task Result Debugger
      debug:
        msg: "Task executed on {{ inventory_hostname }}. Result: {{ item.stdout | default('No Output') }}"
      loop: "{{ [step1_out | default(omit), step2_out | default(omit), step3_out | default(omit), step4_out | default(omit), step5_out | default(omit), step6_out | default(omit), step7a_out | default(omit), step7b_out | default(omit), step8_out | default(omit), step9_out] }}"
      when: item is defined and item.changed

# --- STEP 10: CONSOLIDATE DATA INTO A VARIABLE ---
    - name: 10. Create Report Variable for Email
      run_once: true
      set_fact:
        switchover_report_body: |
          BANK DR SWITCHOVER EXECUTION REPORT
          ==========================================
          Primary Host:   {{ primary_node }}
          Standby Host:   {{ standby_node }}
          Database Name:  {{ db_name | default('SFMS') }}
          ------------------------------------------
          PHASE 1: PRE-CHECKS & BACKUP
          - Step 1 (Archive Backup):    {{ 'SUCCESS' if (hostvars[primary_node].step1_out.rc | default(1) == 0) else 'FAILED/SKIPPED' }}
          - Step 2 (Role Validation):   {{ 'SUCCESS' if (hostvars[primary_node].step2_out.rc | default(1) == 0) else 'FAILED/SKIPPED' }}
          
          PHASE 2: SWITCHOVER EXECUTION
          - Step 3 (Verify Command):    {{ 'SUCCESS' if (hostvars[primary_node].step3_out.rc | default(1) == 0) else 'FAILED/SKIPPED' }}
          - Step 4 (Switchover Cmd):    {{ 'SUCCESS' if (hostvars[primary_node].step4_out.rc | default(1) == 0) else 'FAILED/SKIPPED' }}
          
          PHASE 3: POST-SWITCHOVER STARTUP
          - Step 5 (New Primary Start): {{ 'SUCCESS' if (hostvars[standby_node].step5_out.rc | default(1) == 0) else 'FAILED/SKIPPED' }}
          - Step 6 (New Primary Role):  {{ 'SUCCESS' if (hostvars[standby_node].step6_out.stdout | default('') is search('PRIMARY')) else 'FAILED/SKIPPED' }}
          - Step 8 (New Standby Role):  {{ 'SUCCESS' if (hostvars[primary_node].step8_out.stdout | default('') is search('PHYSICAL STANDBY')) else 'FAILED/SKIPPED' }}
          
          PHASE 4: FINAL CONFIG
          - Step 9 (Log Deferral):      {{ 'SUCCESS' if (hostvars[standby_node].step9_out.rc | default(0) == 0) else 'FAILED/SKIPPED' }}
          ------------------------------------------
          FINAL STATUS: {{ 'COMPLETED SUCCESSFULLY' if (hostvars[primary_node].step8_out.rc | default(1) == 0 and hostvars[standby_node].step6_out.rc | default(1) == 0) else 'CRITICAL FAILURE' }}
          
          DETAILED DIAGNOSTICS:
          Primary Error: {{ hostvars[primary_node].step4_out.stdout | default('No direct switchover error registered.') }}
          Standby Error: {{ hostvars[standby_node].step5_out.stdout | default('No direct standby startup error registered.') }}
      delegate_to: localhost

    - name: Determine Pipeline Switchover Health Matrix
      set_fact:
        switchover_failed: "{{ hostvars[primary_node].step8_out.rc | default(1) != 0 or hostvars[standby_node].step6_out.rc | default(1) != 0 }}"
      run_once: true
      delegate_to: localhost

    # ----------------------------------------------------
    # CONDITION A: RUNTIME FAILURE PATH (Central AAP Failure Handler)
    # ----------------------------------------------------
    - name: Register Global Artifact Variables for AAP Failure Workflow
      set_stats:
        data:
          dr_failed_step: "05_oracle_dataguard_switchover"
          dr_failure_reason: "Oracle Data Guard switchover operation sequence aborted or role inversion failed verification."
          dr_detailed_log: "{{ switchover_report_body }}"
        per_host: no
      when: switchover_failed
      run_once: true
      delegate_to: localhost

    - name: Enforce Hard Failure Path for Automation Workflow
      fail:
        msg: "Oracle role transition failed core constraints. Halting workflow progression."
      when: switchover_failed
      run_once: true
      delegate_to: localhost

    # ----------------------------------------------------
    # CONDITION B: RUNTIME SUCCESS PATH (Only runs if 'fail' is skipped)
    # ----------------------------------------------------
    - name: Register Step Success to Global Matrix Variable
      set_stats:
        data:
          dr_step_04_status: "✅ PASSED (Oracle Data Guard switchover completed and verified)"
        per_host: no
      run_once: true
      delegate_to: localhost

    - name: Dispatch Scattered Success Email for Step 05
      mail:
        host: smtp.yourcompany.com
        port: 25
        subject: "📢 DR UPDATE: Stage [05_oracle_dataguard_switchover] PASSED"
        body: |
          Step 05 has completed successfully. Oracle Database Roles have been seamlessly inverted.
          
          Summary Details:
          {{ switchover_report_body }}
        to: ops-team@yourcompany.com
        from: aap-automation-noreply@yourcompany.com
      ignore_errors: yes
      run_once: true
      delegate_to: localhost
      become: no
