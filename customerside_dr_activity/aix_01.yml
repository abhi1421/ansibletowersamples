---
- name: Step 1 - Stop SFMS Sender Channels
  hosts: all
  become: yes
  become_method: sudo
  become_user: mqm
  gather_facts: no
  vars:
    ansible_become_flags: "-H -S"
    ansible_ssh_pipelining: true
    qmgr: SFMSRBIPADGWQM
    channels:
#      - SFMS.TO.CBS
      - SFMS.TO.QPX
    mqm_binary: /usr/mqm/bin

  tasks:

    - name: Check if Queue Manager is running
      shell: "{{ mqm_binary }}/dspmq | grep {{ qmgr }}"
      register: qm_status
      ignore_errors: yes  

    - name: Check channel status before stop
      shell: "echo 'dis chs({{ item }})' | {{ mqm_binary }}/runmqsc {{ qmgr }}"
      loop: "{{ channels }}"
      register: ch_status_before
      changed_when: false

    - name: Stop channel only if RUNNING
      shell: "echo 'stop channel({{ item.item }})' | {{ mqm_binary }}/runmqsc {{ qmgr }}"
      loop: "{{ ch_status_before.results }}"
      when: "'RUNNING' in item.stdout"
      register: stop_output
      changed_when: "'STOPPED' in stop_output.stdout or 'STOPPING' in stop_output.stdout"

    - name: Wait until channel stops
      shell: "echo 'dis chs({{ item }})' | {{ mqm_binary }}/runmqsc {{ qmgr }}"
      loop: "{{ channels }}"
      register: ch_status_after
      retries: 5
      delay: 5
      until: "'RUNNING' not in ch_status_after.stdout"
      changed_when: false

### REPORTING SECTION #######

    - name: Generate Individual server report
      set_fact:
        host_report: |
          SERVER: {{ inventory_hostname }}
          ---------------------------------
          QMGR Status CHeck: {{ qm_status.stdout | default('N/A') }}
          Channel Execution Details:
          {% for result in ch_status_after.results %}
            - Channel: {{ result.item }}
              Final Status: {{ 'SUCCESSFULLY STOPPED' if 'RUNNING' not in result.stdout else 'FAILED TO STOP' }}
          {% endfor %}

    - name: Consolidate reports for email body
      set_fact:
        consolidated_report: "{{ ansible_play_hosts | map('extract', hostvars, 'host_report') | join('\n\n') }}"
      run_once: true
      delegate_to: localhost

    - name: Show Final Report Content
      debug:
        var: consolidated_report
      run_once: true
