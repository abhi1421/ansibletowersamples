# tasks/reboot_system.yml
# Task to reboot the system if required

- name: Insall dnf-utils for needs-restrating command
  ansible.builtin.dnf:
    name: dnf-utils
    state: present
  become: true  

- name: Check if reboot is required
  ansible.builtin.command: needs-restarting -r
  register: reboot_check
  changed_when: false
  failed_when: false

- name: Show the reboot check result
  debug:
    msg: >
      Reboot check={{ reboot_check.rc }}.
      {{ 'Reboot required' if reboot_check.rc == 1 else 'No reboot required'}}

- name: Reboot the system if required
  ansible.builtin.reboot:
    reboot_timeout: 600 # Wait up to 10 minutes for the system to come back up
#  when: reboot_after_patching | bool
  when: reboot_check.rc == 1
  tags:
    - reboot
