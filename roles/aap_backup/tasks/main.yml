---
# roles/aap_backup/tasks/main.yml

- name: Ensure backup destination exists
  ansible.builtin.file:
    path: "{{ backup_storage_path }}"
    state: directory
    mode: '0755'

- name: Run AAP Backup with Custom Destination
  ansible.builtin.command:
    cmd: >
      ./setup.sh -i {{ inventory_file }} -b 
      -e "backup_dest={{ backup_storage_path }}" 
      -e "use_archive_compression=true" 
      -e "use_db_compression=true"
    chdir: "{{ aap_installer_dir }}"
  register: backup_cmd
  changed_when: true

- name: Gather list of existing backups
  ansible.builtin.find:
    paths: "{{ backup_storage_path }}"
    patterns: "automation-platform-backup-*.tar.gz"
    file_type: file
  register: found_backups

- name: Sort backups newest first
  ansible.builtin.set_fact:
    sorted_backups: "{{ found_backups.files | sort(attribute='mtime', reverse=True) }}"

- name: Identify latest backup file
  ansible.builtin.set_fact:
    latest_backup_file: "{{ sorted_backups[0].path }}"

- name: Remove old backups (keep latest)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ sorted_backups[1:] }}"
  when: sorted_backups | length > 1

- name: Identify latest backup file
  ansible.builtin.set_fact:
    latest_backup_file: "{{ (found_backups.files | sort(attribute='mtime', reverse=true))[0].path }}"

- name: Get Stats of the Newest Backup
  ansible.builtin.stat:
    path: "{{ backup_storage_path }}/automation-platform-backup-latest.tar.gz"
  register: latest_stat

- name: Archive backup to IBM Storage Protect
  ansible.builtin.command:
    cmd: >
      /opt/tivoli/tsm/client/ba/bin/dsmc arch {{ latest_backup_file }}
      -subdir=yes
      -archmc=ANSIBLE_WLY_PV_MGMT
  register: tsm_archive
  changed_when: true

- name: Validate archive success
  ansible.builtin.set_fact:
    archive_status: "{{ 'SUCCESS' if 'finished without failure' in tsm_archive.stdout else 'FAILED' }}" 

- name: Prepare Consolidated Report
  ansible.builtin.set_fact:
    backup_report: |
      AAP BACKUP SUMMARY
      ------------------
      Status: SUCCESS
      Target Inventory: {{ inventory_file }}

      BACKUP FILE CREATED:
      - {{ latest_backup_file | basename }}

      FILE LOCATION:
      {{ backup_storage_path }}

      LATEST BACKUP SIZE:
      {{ (latest_stat.stat.size / 1024 / 1024) | round(2) }} MB

      TAPE ARCHIVE STATUS:
      {{ archive_status }}

      IBM STORAGE PROTECT OUTPUT:
      {{ 'Archive completed successfully' if archive_status == 'SUCCESS' else 'Archive failed - check logs' }}