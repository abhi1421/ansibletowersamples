# ---- DETECT NETWORK REGION BASED ON 2nd OCTET ----
- name: Extract second octet from host IP address
  set_fact:
    host_second_octet: "{{ ansible_default_ipv4.address.split('.')[1] | int }}"

# ---- PDC REGION RULES (Second Octet == 22) ----
- name: Add PDC host entries (Region 22)
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} INSTANA PDC"
    block: |
      {% for entry in pdc_host_entries %}
      {{ entry }}
      {% endfor %}
  when: host_second_octet == 22
  notify: restart instana

- name: Clean up ODC host entries if present in PDC region (Region 22)
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} INSTANA ODC"
    state: absent
  when: host_second_octet == 22
  notify: restart instana


# ---- ODC REGION RULES (Second Octet == 23) ----
- name: Add ODC host entries (Region 23)
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} INSTANA ODC"
    block: |
      {% for entry in odc_host_entries %}
      {{ entry }}
      {% endfor %}
  when: host_second_octet == 23
  notify: restart instana

- name: Clean up PDC host entries if present in ODC region (Region 23)
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} INSTANA PDC"
    state: absent
  when: host_second_octet == 23
  notify: restart instana