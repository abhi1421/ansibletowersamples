---

# Check SCCM Service
- name: Check SCCM service
  ansible.windows.win_service:
    name: CcmExec
  register: sccm_service

- name: Set SCCM service status
  set_fact:
    sccm_service_status: "{{ sccm_service.state | default('NOT FOUND') }}"

# Check Communication
- name: Check SCCM communication
  ansible.windows.win_shell: |
    Select-String -Path "C:\Windows\CCM\Logs\CcmExec.log" -Pattern "Successfully"
  register: sccm_comm
  ignore_errors: yes

- name: Set SCCM communication status
  set_fact:
    sccm_comm_status: "{{ 'OK' if sccm_comm.stdout else 'FAILED' }}"

# 🔧 FIX STEP 1 — Restart Service if not running
- name: Restart SCCM service if stopped
  ansible.windows.win_service:
    name: CcmExec
    state: restarted
  when: sccm_service.state != "running"
  register: sccm_restart

- name: Update action log after restart
  set_fact:
    sccm_action: "Service Restarted"
  when: sccm_service.state != "running"

# 🔧 FIX STEP 2 — Recheck communication
- name: Recheck SCCM communication
  ansible.windows.win_shell: |
    Select-String -Path "C:\Windows\CCM\Logs\CcmExec.log" -Pattern "Successfully"
  register: sccm_comm_retry
  ignore_errors: yes

# 🔧 FIX STEP 3 — Reinstall SCCM if still failing
- name: Reinstall SCCM Agent
  ansible.windows.win_shell: |
    C:\Windows\CCMSetup\ccmsetup.exe /uninstall
    Start-Sleep -Seconds 10
    C:\Windows\CCMSetup\ccmsetup.exe
  when: sccm_comm_retry.stdout == ""
  register: sccm_reinstall
  ignore_errors: yes

- name: Update action if reinstalled
  set_fact:
    sccm_action: "Reinstalled SCCM Agent"
  when: sccm_comm_retry.stdout == ""

# Final fallback
- name: Set default SCCM action if no change
  set_fact:
    sccm_action: "{{ sccm_action | default('No Action Needed') }}"