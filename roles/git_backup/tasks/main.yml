---
# tasks file for git_backup
- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0755'
  register: backup_dir_status

#- name: Create zip archive of git repository
#  community.general.archive:
#    path: "{{ repo_path }}"
#    dest: "{{ backup_dir }}/{{ backup_file }}"
#    format: zip
#  register: backup_result

- name: Create zip backup
  ansible.builtin.shell: >
    zip -r {{ backup_dir }}/prod-aap-project-backup-{{ ansible_date_time.date }}.zip
    {{ repo_path }}
  register: backup_result

- name: Archive backup to IBM Storage Protect
  ansible.builtin.shell: >
    /opt/tivoli/tsm/client/ba/bin/dsmc arch
    {{ backup_dir }}/prod-aap-project-backup-{{ ansible_date_time.date }}.zip
    -subdir=yes
    -archmc=ANSIBLE_WLY_PV_MGMT
  register: tsm_archive_result

- name: Validate TSM archive success
  ansible.builtin.fail:
    msg: "TSM archive failed. Output: {{ tsm_archive_result.stdout }}"
  when: "'finished without failure' not in tsm_archive_result.stdout"

- name: Remove old backups keeping latest 2
  ansible.builtin.shell: |
    ls -1 {{ backup_dir }}/prod-aap-project-backup-*.zip | sort -r | sed -n '3,$p' | xargs rm -f
  register: cleanup_result
  changed_when: cleanup_result.stdout != ""

- name: Get backup file stats
  ansible.builtin.stat:
    path: "{{ backup_dir }}/{{ backup_file }}"
  register: backup_stat

- name: Build consolidated report
  ansible.builtin.set_fact:
    backup_report: |
      AAP Git Backup Report
      =====================
      Host            : {{ ansible_hostname }}
      Repository Path : {{ repo_path }}
      Backup Location : {{ backup_dir }}/{{ backup_file }}
      Backup Date     : {{ ansible_date_time.date }}
      Backup Status   : {{ 'SUCCESS' if backup_result is succeeded else 'FAILED' }}
      TSM Archive     : {{ 'SUCCESS' if 'finished without failure' in tsm_archive_result.stdout else 'FAILED' }}
      File Size       : {{ (backup_stat.stat.size / 1024 / 1024) | round(2) }} MB
