- name: Generate final report
  set_fact:
    patch_report: |
      AAP Patch Execution Report
      ----------------------------------------

      {{ sysinfo.stdout }}

      Patch Mode: {{ patch_mode }}

      Registration: {{ 'OK' if system_registered else 'FAILED' }}

      Repositories:
      {% if repo_missing | length == 0 %}
      All required repositories enabled
      {% else %}
      Missing: {{ repo_missing | join(', ') }}
      {% endif %}

      Errata Status:
      Security Errata: {{ 'Present' if security_errata_present else 'None' }}
      All Errata: {{ 'Present' if any_errata_present else 'None' }}

      Decision:
      {{ decision_reason }}

      Action:
      {% if proceed_with_patching %}
      Patching executed successfully
      {% else %}
      No action performed
      {% endif %}

      {% if proceed_with_patching %}
      Errata Summary Before:
      {{ errata_before.stdout | trim }}

      Errata Summary After:
      {{ errata_after.stdout | trim }}

      Service Status:
      {% for svc, failed in service_results %}
      - {{ svc }} : {{ 'OK' if not failed else 'FAILED' }}
      {% endfor %}
      {% endif %}