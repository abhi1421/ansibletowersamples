- name: Check registration
  set_fact:
    system_registered: "{{ sub_identity.rc == 0 }}"

- name: Validate required repos
  set_fact:
    repo_missing: "{{ required_repos | reject('in', enabled_repos.stdout) | list }}"

- name: Determine errata presence
  set_fact:
    security_errata_present: "{{ security_errata.stdout | trim != '' }}"
    any_errata_present: "{{ all_errata.stdout | trim != '' }}"

- name: Determine if patching should proceed
  set_fact:
    proceed_with_patching: >-
      {{
        system_registered and
        (repo_missing | length == 0) and
        (
          (patch_mode == 'security' and security_errata_present) or
          (patch_mode == 'full' and any_errata_present)
        )
      }}

- name: Decision reason
  set_fact:
    decision_reason: >-
      {% if not system_registered %}
      System not registered (Satellite/SCA issue)
      {% elif repo_missing | length > 0 %}
      Missing required repositories: {{ repo_missing | join(', ') }}
      {% elif patch_mode == 'security' and not security_errata_present %}
      No security errata available
      {% elif patch_mode == 'full' and not any_errata_present %}
      No errata available
      {% else %}
      Eligible for patching (mode: {{ patch_mode }})
      {% endif %}