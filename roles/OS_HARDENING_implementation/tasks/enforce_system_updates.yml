---
# Implementation tasks for System Updates - Builtin Modules Only

# ==============================================================================
# 1. Satellite / Red Hat Subscription Manager Registration
# ==============================================================================
- name: Hardening | Check Satellite/RHSM registration status
  ansible.builtin.command: subscription-manager identity
  register: rhsm_identity
  changed_when: false
  failed_when: false
  tags:
    - system_updates
    - satellite_registration

- name: Compliance | Log Satellite Server registration compliance status
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'System Updates',
      'item': 'Red Hat Satellite Server registration',
      'status': 'OK' if rhsm_identity.rc == 0 else 'NON_COMPLIANT',
      'details': 'Verified. Node is registered with an active identity mapping.' if rhsm_identity.rc == 0 else 'CRITICAL ERROR: Machine is unregistered. Security patch channels are unavailable.'
    }] }}"
  tags:
    - system_updates
    - satellite_registration

# ==============================================================================
# 2. Red Hat Enterprise Linux Release Selection (Value-Matching Integration)
# ==============================================================================
- name: Hardening | Query current subscription release lock state
  ansible.builtin.command: subscription-manager release --show
  register: sub_mgr_release_raw
  changed_when: false
  failed_when: false
  when: 
    - rhsm_identity.rc == 0
    - ansible_facts.distribution == 'RedHat'
  tags:
    - system_updates
    - release_version

- name: Hardening | Lock system to match its exact running point release
  ansible.builtin.command: "subscription-manager release --set={{ ansible_facts.distribution_version }}"
  register: release_set_result
  changed_when: true
  failed_when: false
  when:
    - rhsm_identity.rc == 0
    - ansible_facts.distribution == 'RedHat'
    - sub_mgr_release_raw.rc == 0
    - ansible_facts.distribution_version not in sub_mgr_release_raw.stdout
  tags:
    - system_updates
    - release_version

- name: Compliance | Log RHEL release version compliance status
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'System Updates',
      'item': 'Red Hat Enterprise Linux Release Version',
      'status': 'CHANGED' if (release_set_result.changed | default(false)) else ('OK' if rhsm_identity.rc == 0 else 'NON_COMPLIANT'),
      'details': 'Subscription manager release policy actively aligned to local version ' ~ ansible_facts.distribution_version ~ '.' if (release_set_result.changed | default(false)) else ('Verified. Subscription release is locked to running OS version.' if rhsm_identity.rc == 0 else 'CRITICAL: Blocked by subscription error. Release version mapping could not be validated.')
    }] }}"
  tags:
    - system_updates
    - release_version

# ==============================================================================
# 3. GPG Signature Checking & Verification Keys
# ==============================================================================
- name: Hardening | Ensure GPG Check is globally enabled in DNF
  ansible.builtin.lineinfile:
    path: /etc/dnf/dnf.conf
    regexp: '^gpgcheck='
    line: 'gpgcheck=1'
    state: present
    create: yes
  register: dnf_gpg_res
  tags:
    - system_updates
    - gpg_check

- name: Hardening | Ensure Red Hat GPG keys are imported
  ansible.builtin.rpm_key:
    key: "{{ item }}"
    state: present
  loop:
    - /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
    - /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-compliance
  register: rpm_key_res
  ignore_errors: yes
  tags:
    - system_updates
    - gpg_check

- name: Compliance | Log GPG key and gpgcheck compliance status
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'System Updates',
      'item': 'Red Hat GPG key and gpgcheck',
      'status': 'CHANGED' if (dnf_gpg_res.changed or rpm_key_res.changed) else 'OK',
      'details': 'Enforced global dnf repo validation guards and re-imported mandatory system compliance signing keys.' if (dnf_gpg_res.changed or rpm_key_res.changed) else 'Verified. Repositories hold explicit signature validation constraints and verification keys are active.'
    }] }}"
  tags:
    - system_updates
    - gpg_check