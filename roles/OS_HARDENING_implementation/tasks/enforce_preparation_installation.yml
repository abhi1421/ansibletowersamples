---
# OS_HARDENING_implementation/tasks/enforce_preparation_installation.yml
# Implementation tasks for Preparation and Installation Hardening

# ==============================================================================
# 1. BIOS/Firmware Password Requirement Configuration
# ==============================================================================
- name: Hardening Compliance | Record Manual BIOS Password Requirement
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'Preparation and Installation',
      'item': 'BIOS/firmware password',
      'status': 'MANUAL_REQUIRED',
      'details': 'Security policy requires a strong password on BIOS/UEFI. This hardware-level config must be verified via BMC/IPMI interfaces or direct physical machine interaction.'
    }] }}"
  tags:
    - preparation_installation
    - bios_password

# ==============================================================================
# 2. Device Boot Order Requirement Configuration
# ==============================================================================
- name: Hardening Compliance | Record Manual Boot Order Requirement
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'Preparation and Installation',
      'item': 'Device boot order',
      'status': 'MANUAL_REQUIRED',
      'details': 'Security policy requires primary disk boot target configurations only. Unused alternative boot paths (USB/Optical) must be restricted via firmware settings.'
    }] }}"
  tags:
    - preparation_installation
    - boot_order

# ==============================================================================
# 3. Security Auditing System Event Logging
# ==============================================================================
- name: System Audit | Log manual compliance requirements to syslog
  ansible.builtin.shell: |
    logger "STIG/Hardening: BIOS password and Boot Order must be manually verified per organizational policy."
  changed_when: false
  tags:
    - preparation_installation