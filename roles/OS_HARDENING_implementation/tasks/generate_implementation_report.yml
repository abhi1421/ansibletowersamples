- name: Hardening | Capture Implementation Summary as Fact
  ansible.builtin.set_fact:
    hardening_summary_output:
      - "HARDENING COMPLETE for {{ ansible_hostname }}"
      - "Total Remediation Guard Points Tracked: {{ enforcement_report_results | length }}"
      - "Status Summary Matrix:"
      - "  - Configuration Remediated (CHANGED): {{ enforcement_report_results | selectattr('status', 'equalto', 'CHANGED') | list | length }}"
      - "  - Pre-Compliant Intact (OK):          {{ enforcement_report_results | selectattr('status', 'equalto', 'OK') | list | length }}"
      - "  - Manual Processes Required:          {{ enforcement_report_results | selectattr('status', 'equalto', 'MANUAL_REQUIRED') | list | length }}"
      - "  - System Failures (NON_COMPLIANT):     {{ enforcement_report_results | selectattr('status', 'equalto', 'NON_COMPLIANT') | list | length }}"
      - "Report saved securely to: {{ impl_report_filename }}"
  tags:
    - always
    - report_generation


- name: Implementation Summary (Console Output)
  ansible.builtin.debug:
    msg: "{{ hardening_summary_output }}"
  tags:
    - always
    - report_generation

- name: Hardening | Build HTML Execution Summary
  ansible.builtin.set_fact:
    hardening_summary_html: |
      <!DOCTYPE html>
      <html>
      <head>
      <meta charset="UTF-8">
      <style>

      body {
          font-family: Arial, Helvetica, sans-serif;
          font-size: 14px;
          color: #333333;
      }

      h2 {
          color: #1F4E78;
      }

      table {
          width: 100%;
          border-collapse: collapse;
          margin-top: 20px;
      }

      th {
          background-color: #1F4E78;
          color: white;
          border: 1px solid #cccccc;
          padding: 10px;
          text-align: center;
      }

      td {
          border: 1px solid #cccccc;
          padding: 8px;
          text-align: center;
      }

      tr:nth-child(even) {
          background-color: #f8f9fa;
      }

      .changed {
          background-color: #d4edda;
          color: #155724;
          font-weight: bold;
      }

      .ok {
          background-color: #d1ecf1;
          color: #0c5460;
          font-weight: bold;
      }

      .manual {
          background-color: #fff3cd;
          color: #856404;
          font-weight: bold;
      }

      .failed {
          background-color: #f8d7da;
          color: #721c24;
          font-weight: bold;
      }

      </style>
      </head>

      <body>

      <h2>Hardening Implementation Execution Summary</h2>

      <p>
      <strong>Generated On:</strong> {{ ansible_date_time.iso8601 }}
      </p>

      <table>

      <tr>
          <th>Hostname</th>
          <th>IP Address</th>
          <th>Total Remediation Guard Points Tracked</th>
          <th>Configuration Remediated (CHANGED)</th>
          <th>Pre-Compliant Intact (OK)</th>
          <th>Manual Processes Required</th>
          <th>System Failures (NON_COMPLIANT)</th>
          <th>Report Location</th>
      </tr>

      <tr>

          <td>{{ ansible_hostname }}</td>

          <td>{{ ansible_default_ipv4.address }}</td>

          <td>{{ enforcement_report_results | length }}</td>

          <td class="changed">
              {{ enforcement_report_results | selectattr('status','equalto','CHANGED') | list | length }}
          </td>

          <td class="ok">
              {{ enforcement_report_results | selectattr('status','equalto','OK') | list | length }}
          </td>

          <td class="manual">
              {{ enforcement_report_results | selectattr('status','equalto','MANUAL_REQUIRED') | list | length }}
          </td>

          <td class="failed">
              {{ enforcement_report_results | selectattr('status','equalto','NON_COMPLIANT') | list | length }}
          </td>

          <td style="text-align:left;">
              {{ impl_report_filename }}
          </td>

      </tr>

      </table>

      </body>
      </html>
  tags:
    - always
    - report_generation