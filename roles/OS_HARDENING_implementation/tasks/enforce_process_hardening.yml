---
# Implementation tasks for Process Hardening (Kernel Parameters)

# ==============================================================================
# 1. Core Dump Restrictions (Sysctl & Limits Configuration)
# ==============================================================================
- name: Hardening | Restrict suid core dumps (fs.suid_dumpable)
  ansible.builtin.sysctl:
    name: fs.suid_dumpable
    value: '0'
    state: present
    reload: yes
  register: suid_dump_result
  tags:
    - process_hardening
    - core_dumps

- name: Hardening | Restrict core dumps in limits.conf
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "* hard core 0"
    insertafter: EOF
    state: present
  register: limits_core_result
  tags:
    - process_hardening
    - core_dumps

- name: Compliance | Log core dump restriction compliance status
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'Process Hardening',
      'item': 'Restrict core dumps (fs.suid_dumpable)',
      'status': 'CHANGED' if (suid_dump_result.changed or limits_core_result.changed) else 'OK',
      'details': 'Core dump generation restricted across both runtime kernel parameters (suid_dumpable=0) and user process boundaries (limits.conf Hard Core=0).' if (suid_dump_result.changed or limits_core_result.changed) else 'Verified. Core dump generation restrictions are already active across kernel parameters and process limits.'
    }] }}"
  tags:
    - process_hardening
    - core_dumps

# ==============================================================================
# 2. Address Space Layout Randomization (ASLR Configuration)
# ==============================================================================
- name: Hardening | Enable ASLR (kernel.randomize_va_space)
  ansible.builtin.sysctl:
    name: kernel.randomize_va_space
    value: '2'
    state: present
    reload: yes
  register: aslr_result
  tags:
    - process_hardening
    - randomize_va_space

- name: Compliance | Log randomized VA space compliance status
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'Process Hardening',
      'item': 'Enable randomized virtual memory region placement (kernel.randomize_va_space)',
      'status': 'CHANGED' if aslr_result.changed else 'OK',
      'details': 'Address Space Layout Randomization (ASLR) actively configured and enabled at level 2.' if aslr_result.changed else 'Verified. ASLR is already operational at level 2 (kernel.randomize_va_space=2).'
    }] }}"
  tags:
    - process_hardening
    - randomize_va_space