# Implementation tasks for Device Security (USB Hardening - Manual Track)

# ==============================================================================
# 1. USB Storage Subsystem Blacklisting (Manual Track)
# ==============================================================================
- name: Hardening | Notice regarding USB Mass Storage Restriction
  ansible.builtin.debug:
    msg: "NOTICE: Physical USB port blocking and mass-storage module blacklisting must be verified manually or handled via localized hardware baseline images."
  tags:
    - device_security

- name: Compliance | Log Device Security Manual Requirement Status
  ansible.builtin.set_fact:
    enforcement_report_results: "{{ enforcement_report_results | default([]) + [{
      'category': 'Device Security',
      'item': 'Disable USB Mass Storage',
      'status': 'MANUAL_REQUIRED',
      'details': 'Automated kernel modification for USB storage skipped. Platform security administrators must manually verify that /etc/modprobe.d/usb-storage.conf blocks the storage driver to mitigate physical data exfiltration vectors.'
    }] }}"
  tags:
    - device_security