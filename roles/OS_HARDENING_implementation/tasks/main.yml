---
# tasks file for OS_HARDENING_implementation
# This file orchestrates the systematic execution of all hardening enforcement mechanisms
# and handles final implementation report compiler generation.

- name: Initialize enforcement report structure
  ansible.builtin.set_fact:
    enforcement_report_results: []
  tags:
    - always

- name: Gather system facts for remediation validation
  ansible.builtin.setup:
    gather_subset:
      - network
      - hardware
      - virtual
      - distribution
      - os_family
      - pkg_mgr
      - mounts
      - service_mgr
  tags:
    - facts_gathering

- name: Include preparation and installation hardening enforcement
  ansible.builtin.include_tasks: enforce_preparation_installation.yml
  tags:
    - preparation_installation

- name: Include filesystem configuration hardening enforcement
  ansible.builtin.include_tasks: enforce_filesystem_config.yml
  tags:
    - filesystem_config

