---
- name: Connectivity and Credential Check
  ansible.builtin.ping:
  ignore_unreachable: true
  register: ping_result

- name: Set individual host status flag
  ansible.builtin.set_fact:
    # If ping_result has 'ping: pong', it's a definite success.
    # Otherwise, it's a failure.
    host_status: "{{ 'SUCCESS' if (ping_result.ping is defined and ping_result.ping == 'pong') else 'FAILED' }}"

- name: Build the failure report string
  ansible.builtin.set_fact:
    failed_hosts_report: |
      {% for h in ansible_play_hosts_all %}
      {% if hostvars[h]['host_status'] == 'FAILED' %}
      - {{ h }} (Reason: {{ hostvars[h]['ping_result']['msg'] | default('Unreachable or Auth Error') }})
      {% endif %}
      {% endfor %}
  run_once: true
  delegate_to: localhost
  
