---
# tasks/05_create_config_files.yml

- name: Create Instana agent configuration directories
  ansible.builtin.file:
    path: /etc/systemd/system/instana-agent.service.d
    state: directory
    mode: '0755'
    recurse: true # Create parent directories if they don't exist
  tags: [create_configs]


- name: Create Instana agent configuration directories
  ansible.builtin.file:
    path: /opt/instana/agent/etc/instana
    state: directory
    mode: '0755'
    recurse: true # Create parent directories if they don't exist
  tags: [create_configs]


#- name: Copy Instana agent config files from role files/ dir
#  ansible.builtin.copy:
#    src: 10-environment.conf 
#    dest: /etc/systemd/system/instana-agent.service.d/10-environment.conf
#    mode: '0644'
#  tags: [create_configs]

- name: Copy Instana agent config files from role files/ dir
  ansible.builtin.copy:
    src: 30-service.conf
    dest: /etc/systemd/system/instana-agent.service.d/30-service.conf
    mode: '0644'
  tags: [create_configs]

- name: Copy Instana agent config files from role files/ dir
  ansible.builtin.copy:
    src: 40-memory.conf
    dest: /etc/systemd/system/instana-agent.service.d/40-memory.conf
    mode: '0644'
  tags: [create_configs]

- name: Copy Backend config for PDC
  ansible.builtin.copy:
    src: com.instana.agent.main.sender.Backend-1.cfg
    dest: /opt/instana/agent/etc/instana/com.instana.agent.main.sender.Backend-1.cfg
    mode: '0644'
  when: instana_backend_type == "PDC" or instana_backend_type == "BOTH"
  tags: [create_configs]

- name: Copy Backend config for ODC
  ansible.builtin.copy:
    src: com.instana.agent.main.sender.Backend-2.cfg
    dest: /opt/instana/agent/etc/instana/com.instana.agent.main.sender.Backend-2.cfg
    mode: '0644'
  when: instana_backend_type == "ODC" or instana_backend_type == "BOTH"
  tags: [create_configs]

- name: Copy Instana agent config files from role files/ dir
  ansible.builtin.copy:
    src: com.instana.agent.main.config.UpdateManager.cfg
    dest: /opt/instana/agent/etc/instana/com.instana.agent.main.config.UpdateManager.cfg
    mode: '0644'
  tags: [create_configs]

- name: Copy Instana agent config files from role files/ dir
  ansible.builtin.copy:
    src: configuration.yaml
    dest: /opt/instana/agent/etc/instana/configuration.yaml
    mode: '0644'
  tags: [create_configs]
