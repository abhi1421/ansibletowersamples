---
# tasks/03_configure_hosts_and_env.yml

- name: Add host entries for ODC (22 subnet)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item }}"
    state: present
    create: true
    insertafter: EOF
  loop: "{{ lookup('ansible.builtin.file', 'odc_instana_host_entries_when22octet.txt').splitlines() }}"
  when: ansible_default_ipv4.address.split('.')[1] == '22'
  tags: [configure_system]

- name: Add host entries for PDC (23 subnet)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item }}"
    state: present
    create: true
    insertafter: EOF
  loop: "{{ lookup('ansible.builtin.file', 'instana_host_entries23octet.txt').splitlines() }}"
  when: ansible_default_ipv4.address.split('.')[1] == '23'
  tags: [configure_system]