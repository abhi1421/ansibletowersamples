# tasks/reboot_system.yml
# Task to reboot the system if required
## Check if reboot is required

- name: Check if reboot is required
  ansible.builtin.command: needs-restarting -r
  register: reboot_check
  changed_when: false
  failed_when: false

# Optional debug (good for logs)

- name: Show reboot check result
  ansible.builtin.debug:
    msg: >
      Reboot check rc={{ reboot_check.rc }}.
      {{ 'Reboot required' if reboot_check.rc == 1 else 'No reboot required' }}

# Perform reboot only if needed

- name: Reboot the system if required
  ansible.builtin.reboot:
    reboot_timeout: 600
  when: reboot_check.rc == 1
  tags:
    - reboot

