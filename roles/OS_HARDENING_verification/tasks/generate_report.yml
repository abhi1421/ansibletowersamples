---
# os_hardening_verification/tasks/generate_report.yml
# This file compiles all compliance check results and generates a human-readable report.

- name: Prepare report content
  ansible.builtin.set_fact:
    report_content: |
      # Compliance Report for Host: {{ ansible_hostname }} ({{ ansible_default_ipv4.address }})
      ## Date: {{ ansible_date_time.iso8601_micro }}

      This report summarizes the compliance status of the host against the defined hardening requirements.

      ### Summary of Compliance Status:
      - **COMPLIANT:** {{ compliance_report_results | selectattr('status', 'equalto', 'COMPLIANT') | list | length }} items
      - **NON_COMPLIANT:** {{ compliance_report_results | selectattr('status', 'equalto', 'NON_COMPLIANT') | list | length }} items
      - **MANUAL_REQUIRED:** {{ compliance_report_results | selectattr('status', 'equalto', 'MANUAL_REQUIRED') | list | length }} items

      ### Detailed Compliance Information:

      {% for category in compliance_report_results | map(attribute='category') | unique | sort %}
      #### {{ category }}

      | Item | Status | Expected | Actual | Message |
      |---|---|---|---|---|
      {% for item in compliance_report_results | selectattr('category', 'equalto', category) %}
      | {{ item.item }} | **{{ item.status }}** | {{ item.expected }} | {{ item.actual }} | {{ item.message }} |
      {% endfor %}

      {% endfor %}
  # This Jinja2 template generates a Markdown-formatted report.
  # It groups results by category for better readability.
  tags:
    - always
    - report_generation # Tag for report generation

- name: Display compliance report (console output)
  ansible.builtin.debug:
    msg: "{{ report_content }}"
  # Output the report to the console for immediate viewing.
  tags:
    - always
    - report_generation


- name: Construct the consolidated email body
  ansible.builtin.set_fact:
    email_summary_body: |
      OS Hardening Verification Summary
      Execution Date: {{ ansible_date_time.date }}
      -----------------------------------------
      {% for host in ansible_play_hosts %}
      Host: {{ host }} ({{ hostvars[host]['ansible_default_ipv4']['address'] | default('N/A') }})
      - Compliant:     {{ hostvars[host]['compliance_report_results'] | selectattr('status', 'equalto', 'COMPLIANT') | list | length }}
      - Non-Compliant: {{ hostvars[host]['compliance_report_results'] | selectattr('status', 'equalto', 'NON_COMPLIANT') | list | length }}
      - Manual Check:  {{ hostvars[host]['compliance_report_results'] | selectattr('status', 'equalto', 'MANUAL_REQUIRED') | list | length }}
      -----------------------------------------
      {% endfor %}
      
      Detailed Markdown reports are available on the Ansible Controller.
  delegate_to: localhost
  run_once: true
  tags:
    - report_generation


## NEW ADDITION
- name: Define report filename
  ansible.builtin.set_fact:
    report_filename: "/tmp/compliance_report_{{ ansible_facts.default_ipv4.address | replace('.', '-') }}_{{ ansible_date_time.date | replace('-', '') }}.md"
  tags:
    - always
    - report_generation

- name: Save compliance report to file on target host
  ansible.builtin.copy:
    content: "{{ report_content }}"
    dest: "{{ report_filename }}"
    mode: '0644'
  tags:
    - always
    - report_generation

- name: Create destination directory on control node
  ansible.builtin.file:
    path: /home/ansible/reports/jobs/hardeningverify/{{ ansible_facts.default_ipv4.address | replace('.', '-') }}/
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: no
  run_once: true
  tags:
    - always
    - report_generation

- name: Fetch report file to Ansible control node
  ansible.builtin.fetch:
    src: "{{ report_filename }}"
    dest: "/mnt/host_share/"
#    dest: "/home/ansible/reports/jobs/hardeningverify/{{ ansible_facts.default_ipv4.address | replace('.', '-') }}/"
    flat: yes
  tags:
    - always
    - report_generation

## END OF NEW ADDITION


- name: Construct the consolidated HTML email body
  ansible.builtin.set_fact:
    email_summary_html: |
      <!DOCTYPE html>
      <html>
      <head>
      <meta charset="UTF-8">
      <style>

      body {
          font-family: Arial, Helvetica, sans-serif;
          font-size: 14px;
          color: #333333;
          background-color: #ffffff;
      }

      h2 {
          color: #1F4E78;
          margin-bottom: 5px;
      }

      p {
          margin-top: 0;
      }

      table {
          width: 100%;
          border-collapse: collapse;
          margin-top: 20px;
      }

      th {
          background-color: #1F4E78;
          color: white;
          border: 1px solid #cccccc;
          padding: 10px;
          text-align: center;
      }

      td {
          border: 1px solid #cccccc;
          padding: 8px;
          text-align: center;
          vertical-align: middle;
      }

      tr:nth-child(even) {
          background-color: #f8f9fa;
      }

      .compliant {
          background-color: #d4edda;
          color: #155724;
          font-weight: bold;
      }

      .manual {
          background-color: #fff3cd;
          color: #856404;
          font-weight: bold;
      }

      .noncompliant {
          background-color: #f8d7da;
          color: #721c24;
          font-weight: bold;
      }

      </style>
      </head>

      <body>

      <h2>OS Hardening Verification Summary</h2>

      <p>
      <strong>Execution Date:</strong> {{ ansible_date_time.iso8601 }}
      </p>

      <table>

      <tr>
          <th>Hostname</th>
          <th>IP Address</th>
          <th>Compliant</th>
          <th>Non-Compliant</th>
          <th>Manual Required</th>
          <th>Report Location</th>
      </tr>

      {% for host in ansible_play_hosts | sort %}

      <tr>

          <td>{{ hostvars[host].ansible_hostname | default(host) }}</td>

          <td>{{ hostvars[host].ansible_default_ipv4.address | default('N/A') }}</td>

          <td class="compliant">
              {{ hostvars[host].compliance_report_results
                 | selectattr('status', 'equalto', 'COMPLIANT')
                 | list | length }}
          </td>

          <td class="noncompliant">
              {{ hostvars[host].compliance_report_results
                 | selectattr('status', 'equalto', 'NON_COMPLIANT')
                 | list | length }}
          </td>

          <td class="manual">
              {{ hostvars[host].compliance_report_results
                 | selectattr('status', 'equalto', 'MANUAL_REQUIRED')
                 | list | length }}
          </td>

          <td style="text-align:left;">
              {{ hostvars[host].report_filename | default('N/A') }}
          </td>

      </tr>

      {% endfor %}

      </table>

      </body>
      </html>
  delegate_to: localhost
  run_once: true
  tags:
    - report_generation