---
- name: Apply Bugfix Patches
  ansible.builtin.yum:
    name: "*"
    bugfix: true
    state: latest
  register: bugfix_result
  ignore_errors: true
  tags: [patching, bugfix_patches]

- name: Count Bugfix packages updated
  ansible.builtin.set_fact:
    bugfix_patch_count: >-
      {{
        (bugfix_result.results | select('match', '^Installed:') | list | length)
          if (bugfix_result is defined and bugfix_result.rc is defined and bugfix_result.rc == 0)
          else 0
      }}
  when: bugfix_result is defined

- name: Set bugfix patch status
  ansible.builtin.set_fact:
    bugfix_status: "{{ 'Completed' if (bugfix_result.rc | default(1) == 0) else 'Failed' }}"
  when: bugfix_result is defined
