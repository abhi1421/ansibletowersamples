---
- name: Apply security patches (Aligned to Audit Severity Filters)
  become: yes
  ansible.builtin.dnf:
    name: "*"
    security: true
    severity:
      - Critical
      - Important
    state: latest
  register: security_result
  ignore_errors: true
  tags: [patching, security_patches]

- name: Count security packages updated
  ansible.builtin.set_fact:
    security_patch_count: >-
      {{
        (security_result.results | select('match', '^Installed:') | list | length)
          if (security_result is defined and security_result.rc is defined and security_result.rc == 0)
          else 0
      }}
  when: security_result is defined

- name: Set security patch status
  ansible.builtin.set_fact:
    security_status: "{{ 'Completed' if (security_result.rc | default(1) == 0) else 'Failed' }}"
  when: security_result is defined
