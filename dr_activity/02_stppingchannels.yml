---
- name: DR-SFMS-PAD-Stop-Sender-Channels
  hosts: sfms_pad_servers
  gather_facts: no
  vars:
    qmgr: "SFMSRBIPADGWQM"
    channels:
      - SFMS.TO.CBS
      - SFMS.TO.QPX

  tasks:

    - name: Initialize execution report
      set_fact:
        execution_report: []

    - name: Print start message
      debug:
        msg: "Starting DR activity: Stop sender channels from SFMS PAD to CBS & QPX"

    # 🔹 Step 1: Validate Queue Manager
    - name: Check if Queue Manager is running
      shell: dspmq | grep "{{ qmgr }}"
      register: qm_status
      ignore_errors: yes

    - name: Validate Queue Manager status
      fail:
        msg: "Queue Manager {{ qmgr }} is not running. Aborting activity."
      when: qm_status.rc != 0

    - name: Append QM status to report
      set_fact:
        execution_report: "{{ execution_report + ['Queue Manager ' ~ qmgr ~ ' is running'] }}"

    # 🔹 Step 2: Loop through channels
    - name: Process channels
      block:

        - name: Display channel status
          shell: |
            echo "dis chs({{ item }})" | runmqsc {{ qmgr }}
          register: chs_status
          loop: "{{ channels }}"
          loop_control:
            loop_var: item

        - name: Log channel status
          set_fact:
            execution_report: "{{ execution_report + [ 'Channel ' ~ item.item ~ ' status checked: ' ~ (item.stdout | default('No output')) ] }}"
          loop: "{{ chs_status.results }}"

        - name: Stop channel
          shell: |
            echo "stop CHANNEL({{ item }})" | runmqsc {{ qmgr }}
          register: stop_status
          loop: "{{ channels }}"
          loop_control:
            loop_var: item

        - name: Validate channel stop output
          set_fact:
            execution_report: "{{ execution_report + [ 'Channel ' ~ item.item ~ ' stop output: ' ~ (item.stdout | default('No output')) ] }}"
          loop: "{{ stop_status.results }}"

        - name: Verify channel stopped
          shell: |
            echo "dis chs({{ item }})" | runmqsc {{ qmgr }}
          register: verify_status
          loop: "{{ channels }}"
          loop_control:
            loop_var: item

        - name: Append verification results
          set_fact:
            execution_report: "{{ execution_report + [ 'Post-stop verification for ' ~ item.item ~ ': ' ~ (item.stdout | default('No output')) ] }}"
          loop: "{{ verify_status.results }}"

      rescue:
        - name: Capture failure
          set_fact:
            execution_report: "{{ execution_report + ['ERROR: Failure occurred during channel operations'] }}"

        - name: Fail playbook
          fail:
            msg: "Channel stop activity failed. Check logs."

    # 🔹 Final Summary
    - name: Generate consolidated report
      set_fact:
        final_report: |
          DR Activity: Stop Sender Channels (SFMS PAD → CBS & QPX)
          --------------------------------------------------------
          {% for line in execution_report %}
          - {{ line }}
          {% endfor %}
          --------------------------------------------------------
          Status: COMPLETED

    - name: Print final report
      debug:
        var: final_report