---
- name: DR Activity - Message Reconciliation (NEFT Inward)
  hosts: db_servers
  gather_facts: no

  vars:
    db_user: "{{ db_user }}"
    db_password: "{{ db_password }}"
    db_connection_string: "{{ db_connection_string }}"
    script_path: "{{ script_path | default('/opt/db/scripts') }}"
    
    # REPLACE THIS LATER
    success_keyword: "SUCCESS_PLACEHOLDER"

  tasks:

    - name: Execute ISO Reconciliation Script
      shell: |
        sqlplus -s {{ db_user }}/{{ db_password }}@{{ db_connection_string }} <<EOF
        SET HEADING OFF;
        SET FEEDBACK OFF;
        @{{ script_path }}/EOD_Recon_ISO.sql
        EXIT;
        EOF
      register: iso_output
      failed_when: iso_output.rc != 0

    - name: Execute NEFT Processing Script
      shell: |
        sqlplus -s {{ db_user }}/{{ db_password }}@{{ db_connection_string }} <<EOF
        SET HEADING OFF;
        SET FEEDBACK OFF;
        @{{ script_path }}/EOD_NEFT_post12_new_1.sql
        EXIT;
        EOF
      register: neft_output
      failed_when: neft_output.rc != 0

    # GREP VALIDATION (PLACEHOLDER)
    - name: Validate ISO script output using keyword
      fail:
        msg: "ISO reconciliation validation failed - keyword not found"
      when: success_keyword not in iso_output.stdout

    - name: Validate NEFT script output using keyword
      fail:
        msg: "NEFT processing validation failed - keyword not found"
      when: success_keyword not in neft_output.stdout

    - name: Check for ORA errors
      fail:
        msg: "Database error found in output"
      when: "'ORA-' in iso_output.stdout or 'ORA-' in neft_output.stdout"

    - name: Final Status
      debug:
        msg: "Message Reconciliation completed successfully"