---
- name: Tenable Backup Copy, Cleanup & Consolidated Report
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    source_dir: "/tenable-backup/"
    dest_dir: "/DRDC/tenable-backup/"
    file_pattern: "tenable-sc-pdcvmt*.tar"

  tasks:

    # Dates
    - name: Set date facts
      set_fact:
        today_date: "{{ ansible_date_time.date }}"
        yesterday_date: "{{ lookup('pipe', 'date -d \"yesterday\" +%Y-%m-%d') }}"

    # Find files
    - name: Find backup files
      find:
        paths: "{{ source_dir }}"
        patterns: "{{ file_pattern }}"
      register: found_files

    # Identify today's file
    - name: Identify today's file
      set_fact:
        final_file: "{{ item.path }}"
      loop: "{{ found_files.files }}"
      when: today_date in item.path
      register: today_file_result

    - name: Set final file properly
      set_fact:
        final_file: "{{ (today_file_result.results | selectattr('ansible_facts.final_file','defined') | map(attribute='ansible_facts.final_file') | list)[0] | default('') }}"

    # Copy
    - name: Copy today's backup file
      copy:
        src: "{{ final_file }}"
        dest: "{{ dest_dir }}"
        remote_src: yes
      when: final_file != ""
      register: copy_status

    # Delete yesterday
    - name: Delete yesterday's backup file
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ found_files.files }}"
      when: yesterday_date in item.path
      register: delete_status

    # Store per-host result (no separate report yet)
    - name: Store execution result
      set_fact:
        host_result:
          host: "{{ inventory_hostname }}"
          date: "{{ today_date }}"
          file: "{{ final_file if final_file != '' else 'Not Found' }}"
          copy_status: >-
            {% if copy_status is defined and copy_status.changed %}
            Success
            {% elif copy_status is defined and not copy_status.changed %}
            No Change
            {% else %}
            Skipped
            {% endif %}
          deleted_files: >-
            {{ delete_status.results | selectattr('changed','equalto',true)
               | map(attribute='path') | list }}
          status: "{{ 'SUCCESS' if final_file != '' else 'FAILED' }}"

    # 🔽 SINGLE FINAL CONSOLIDATED REPORT TASK
    - name: Build consolidated report
      run_once: true
      delegate_to: localhost
      set_fact:
        final_report: |
          Consolidated Backup Report
          ==========================

          {% for host in ansible_play_hosts %}
          ----------------------------------------
          Host: {{ host }}
          ----------------------------------------
          Date: {{ hostvars[host].host_result.date }}

          File Copied:
          {{ hostvars[host].host_result.file }}

          Copy Status:
          {{ hostvars[host].host_result.copy_status }}

          Deleted (Yesterday):
          {% if hostvars[host].host_result.deleted_files | length > 0 %}
          {% for f in hostvars[host].host_result.deleted_files %}
          - {{ f }}
          {% endfor %}
          {% else %}
          No file deleted
          {% endif %}

          Status: {{ hostvars[host].host_result.status }}

          {% endfor %}

    - name: Print final report
      run_once: true
      delegate_to: localhost
      debug:
        var: final_report